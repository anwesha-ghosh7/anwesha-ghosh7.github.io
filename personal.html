<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>personal</title>
  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('theme');
        if (storedTheme !== 'light' && storedTheme !== 'dark') {
          storedTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = storedTheme;
      } catch (error) {
        document.documentElement.dataset.theme = 'light';
      }
    }());
  </script>
  <style>
    body {
      margin-left: 300px;
      margin-right: 300px;
      font-family: "Courier New", monospace;
      font-size: 16px;
    }
    h1 {
      color: #ffc0cb;
      font-family: "Courier";
      font-size: 25px;
    }
    .blog-section {
      margin-top: 40px;
      padding: 20px;
      border-top: 1px solid #ccc;
    }
    .blog-post {
      margin-bottom: 30px;
    }
    .blog-post h2 {
      color: #333;
      font-size: 22px;
    }
    .blog-post p {
      color: #555;
      line-height: 1.6;
    }
    @media (max-width: 768px) {
      body {
      margin: 0 20px;
      }
      h1 {
      font-size: 20px;
      }
    }
    </style>
    <link rel="stylesheet" href="files/theme.css">
    <script src="files/theme.js" defer></script>
  </head>
  <body>
    <button class="theme-toggle" type="button" data-theme-toggle></button>
    <h1><b>personal</b></h1>


    <a href="index.html" class="button-link">back</a>
  

  </body>
  </html>
