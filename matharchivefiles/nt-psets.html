<!DOCTYPE html>
<html>
<head>
    <title>solved stuff</title>
    <script>
        (function () {
            try {
                var storedTheme = localStorage.getItem('theme');
                if (storedTheme !== 'light' && storedTheme !== 'dark') {
                    storedTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.dataset.theme = storedTheme;
            } catch (error) {
                document.documentElement.dataset.theme = 'light';
            }
        }());
    </script>
    <style>
        body {
            margin: 0 300px;
        }
        h1 {
            font-family: monospace;
        }
    </style>
    <link rel="stylesheet" href="../files/theme.css">
    <script src="../files/theme.js" defer></script>
</head>
<body>
    <button class="theme-toggle" type="button" data-theme-toggle></button>
